<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Virtus Shop</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; background: #f6f8fa; color: #1f2328; }
  h1 { color: #34577c; } h1 small { font-size: .5em; color: #888; font-weight: normal; }
  table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 2rem; }
  th, td { padding: .6rem .8rem; text-align: left; border-bottom: 1px solid #eee; }
  th { background: #34577c; color: #fff; font-weight: 600; }
  input[type=number] { width: 4.5rem; padding: .3rem; }
  button { background: #2da44e; color: #fff; border: 0; padding: .4rem .9rem; border-radius: 6px; cursor: pointer; }
  button:hover { background: #218739; }
  #msg { padding: .7rem 1rem; border-radius: 6px; margin-bottom: 1rem; display: none; }
  #msg.ok { background: #d1f0d9; display: block; } #msg.err { background: #ffd7d5; display: block; }
  .muted { color: #888; font-size: .85em; }
</style>
</head>
<body>
<h1>🛒 Virtus Shop <small>frontend: shop-ui — API via Istio gateway</small></h1>
<div id="msg"></div>

<h2>Produk <span class="muted">(GET /api/products → product-api → MySQL VM)</span></h2>
<table id="products"><thead>
<tr><th>ID</th><th>Nama</th><th>Harga</th><th>Stok</th><th>Qty</th><th></th></tr>
</thead><tbody></tbody></table>

<h2>Order <span class="muted">(POST /api/orders → order-api → product-api → MySQL)</span></h2>
<table id="orders"><thead>
<tr><th>ID</th><th>Produk</th><th>Qty</th><th>Total</th><th>Waktu</th></tr>
</thead><tbody></tbody></table>

<script>
const rp = n => "Rp " + Number(n).toLocaleString("id-ID");
const msg = (t, ok) => { const m = document.getElementById("msg"); m.textContent = t; m.className = ok ? "ok" : "err"; };

async function loadProducts() {
  const r = await fetch("/api/products");
  const data = await r.json();
  const tb = document.querySelector("#products tbody");
  tb.innerHTML = "";
  for (const p of data) {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${p.id}</td><td>${p.name}</td><td>${rp(p.price)}</td><td>${p.stock}</td>
      <td><input type="number" min="1" value="1" id="qty-${p.id}"></td>
      <td><button onclick="buy(${p.id})">Beli</button></td>`;
    tb.appendChild(tr);
  }
}

async function loadOrders() {
  const r = await fetch("/api/orders");
  const data = await r.json();
  const tb = document.querySelector("#orders tbody");
  tb.innerHTML = "";
  for (const o of (data || []).slice().reverse()) {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${o.id}</td><td>${o.product}</td><td>${o.quantity}</td>
      <td>${rp(o.total)}</td><td>${new Date(o.created_at).toLocaleString("id-ID")}</td>`;
    tb.appendChild(tr);
  }
}

async function buy(id) {
  const qty = parseInt(document.getElementById("qty-" + id).value, 10);
  const r = await fetch("/api/orders", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ product_id: id, quantity: qty })
  });
  const body = await r.json();
  if (r.ok) msg(`Order #${body.id}: ${body.product} × ${body.quantity} = ${rp(body.total)}`, true);
  else msg("Gagal: " + (body.error || r.status), false);
  await loadProducts(); await loadOrders();
}

loadProducts(); loadOrders();
setInterval(() => { loadProducts(); loadOrders(); }, 10000);
</script>
</body>
</html>
